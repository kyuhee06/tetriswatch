<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 ⏰ (Tetris Clock) - Locked Screen</title>
    <style>
        :root {
            --bg-color: #000000;
            --grid-color: #000000;
            --border-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center; 
            width: 1080px;
            height: 1920px;
            box-sizing: border-box;
            cursor: none; 
            

            overflow: hidden; 
        }


        #game-container {
            position: relative;
            width: 366px;  
            height: 1732px; 
            border: 4px solid var(--border-color);
            background: var(--grid-color);
            box-sizing: content-box; 
            overflow: hidden;
            transition: transform 0.1s ease-out; 
            
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas {
            display: block;
            background: transparent;
        }


        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }

 
        .full-flash {
            animation: full-flash-anim 0.6s ease-out;
        }
        @keyframes full-flash-anim {
            0% { filter: brightness(1) invert(0); }
            10% { filter: brightness(5) invert(1); } 
            100% { filter: brightness(1) invert(0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="tetrisCanvas" width="360" height="1728"></canvas>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const gameContainer = document.getElementById('game-container');

    const COLS = 12; 
    const ROWS = 64; 
    
    const BLOCK_SIZE_X = 30; 
    const BLOCK_SIZE_Y = 27; 

    const WALL_COLOR = '#606060';
    
    const BLOCK_COLORS = ['#FF0000', '#FF7B00', '#FFEA00', '#00FF4D', '#00FFFF', '#004DFF', '#FF00F2'];
    
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    let targetX = Math.floor(COLS / 2); 
    let currentBlockColor = '#FF0000';  
    let lastHour = -1;
    
    let isAnimating = false; 
    let isFlashing = false;   
    let lastTriggeredMin = -1; 

    function updateBlockColor() {
        const now = new Date();
        const currentHour = now.getHours();
        
        if (currentHour !== lastHour) {
            let newColor;
            do {
                newColor = BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)];
            } while (newColor === currentBlockColor);
            
            currentBlockColor = newColor;
            lastHour = currentHour;
        }
    }

    function updateTargetXRandomly() {
        let newTargetX;
        do {
            newTargetX = Math.floor(Math.random() * COLS);
        } while (newTargetX === targetX);
        targetX = newTargetX;
    }

    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        const clearedLines = (currentMin % 15) * 4;
        const maxWallRows = ROWS - 4; 
        const activeRows = maxWallRows - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        for (let r = ROWS - activeRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) {
                    board[r][c] = WALL_COLOR;
                }
            }
        }
    }

    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    if (isFlashing && r >= 60) {
                        ctx.fillStyle = '#ffffff';
                    } else {
                        ctx.fillStyle = board[r][c];
                    }
                    
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(c * BLOCK_SIZE_X + 1, r * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
                }
            }
        }

        ctx.fillStyle = currentBlockColor;
        if (!isAnimating) {
            let blockY = currentSec; 
            
            for (let i = 0; i < 4; i++) {
                let currentBlockY = blockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(targetX * BLOCK_SIZE_X + 1, currentBlockY * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
                }
            }
        } else {
            for (let i = 0; i < 4; i++) {
                let currentBlockY = 60 + i;
                ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.strokeRect(targetX * BLOCK_SIZE_X + 1, currentBlockY * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
            }
        }
    }

    function reloadWallAnimation() {
        const maxWallRows = ROWS - 4; 
        for (let r = ROWS - maxWallRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) board[r][c] = WALL_COLOR;
            }
        }
        draw(0);
        isAnimating = false; 
    }

    function ticTok() {
        if (isAnimating) {
            requestAnimationFrame(ticTok);
            return;
        }

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        updateBlockColor();

        if (sec === 0 && min !== lastTriggeredMin) {
            lastTriggeredMin = min;
            triggerClearRoutine(min);
            requestAnimationFrame(ticTok);
            return;
        }

        if (sec !== 0) {
            lastTriggeredMin = -1; 
        }

        draw(sec); 
        requestAnimationFrame(ticTok);
    }

    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        for (let i = 0; i < 4; i++) {
            board[60 + i][targetX] = currentBlockColor;
        }
        draw(0);

        setTimeout(() => {
            isFlashing = true; 
            gameContainer.classList.add('flash'); 
            gameContainer.style.transform = "translateY(-20px)";
            draw(0); 

            setTimeout(() => {
                gameContainer.style.transform = "translateY(0px)"; 
                gameContainer.classList.remove('flash');
                isFlashing = false; 

                const targetRowStart = 60;
                board.splice(targetRowStart, 4); 
                for (let i = 0; i < 4; i++) {
                    board.unshift(Array(COLS).fill(0));
                }

                if (currentMin % 15 === 0) {
                    updateTargetXRandomly(); 
                }

                generateWall();
                draw(0); 

                if (currentMin % 15 === 0) {
                    board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                    draw(0);
                    
                    document.body.classList.add('full-flash');
                    
                    setTimeout(() => {
                        reloadWallAnimation(); 
                    }, 100);

                    setTimeout(() => {
                        document.body.classList.remove('full-flash');
                        isAnimating = false; 
                    }, 600); 
                } else {
                    isAnimating = false; 
                }
            }, 300); 

        }, 300); 
    }

    updateBlockColor();
    generateWall();
    draw(new Date().getSeconds());
    
    requestAnimationFrame(ticTok);
</script>

</body>
</html>
