<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 (Tetris Clock) - Perfect Sync</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --grid-color: #1a1a2e;
            --cyan-color: #00f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 세로 디스플레이 레이아웃 캐비닛 */
        #cabinet {
            width: 450px;
            height: 850px;
            background: #111;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 대형 AABB 점수판 (HHMM 시계) */
        #scoreboard {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #score-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #score-digits {
            font-size: 48px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            letter-spacing: 5px;
        }

        /* 테트리스 게임 화면 배경 네모 (세로 64칸) */
        #game-container {
            position: relative;
            width: 200px;  
            height: 640px; 
            border: 3px solid #555;
            background: var(--grid-color);
            overflow: hidden;
            transition: transform 0.1s ease-out; 
        }

        canvas {
            display: block;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 60초 정각 연출용 번쩍임 효과 */
        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="cabinet">
    <div id="scoreboard">
        <div id="score-label">SCORE (HHMM)</div>
        <div id="score-digits">0000</div>
    </div>

    <div id="game-container">
        <canvas id="tetrisCanvas" width="200" height="640"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 64; 
    const BLOCK_SIZE_X = 20; 
    const BLOCK_SIZE_Y = 10; 

    const COLORS = ['#e53e3e', '#dd6b20', '#ecc94b', '#38a169', '#3182ce', '#805ad5'];
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 9;       
    let isAnimating = false; 
    let lastTriggeredMin = -1; 
    let freezeBlockY = 0;      

    // 실시간 분(Minute)에 따른 성벽 초기화 함수
    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        const clearedLines = (currentMin % 15) * 4;
        const maxWallRows = ROWS - 4; 
        const activeRows = maxWallRows - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        for (let r = ROWS - activeRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) {
                    board[r][c] = COLORS[(r + c) % COLORS.length];
                }
            }
        }
    }

    // 렌더링 함수
    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 고정된 배경 블록 성벽 그리기
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    ctx.fillStyle = board[r][c];
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }

        // 2. 하늘색 롱블록 실시간 위치 그리기
        ctx.fillStyle = '#00f0f0';
        if (!isAnimating) {
            // 00초 스폰 위치 규칙 엄수 및 1초에 1칸씩 하강
            let blockY = currentSec; 
            
            for (let i = 0; i < 4; i++) {
                let currentBlockY = blockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        } else {
            // [수정] 오차가 발생할 수 있는 노이즈를 전면 차단하고, 연산된 정확한 바닥 위치에 고정
            for (let i = 0; i < 4; i++) {
                let currentBlockY = freezeBlockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }
    }

    // 시분(AABB) 실시간 업데이트 함수
    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    // 15분 주기 완료 시 초고속 리로드 애니메이션
    function reloadWallAnimation() {
        isAnimating = true;
        let r = 4; 
        
        const interval = setInterval(() => {
            if (r < ROWS) {
                for (let c = 0; c < COLS; c++) {
                    if (c !== targetX) board[r][c] = COLORS[(r + c) % COLORS.length];
                }
                draw(0);
                r += 2;
            } else {
                clearInterval(interval);
                isAnimating = false;
            }
        }, 15);
    }

    // 메인 시계 타이머 (실시간 체크)
    function ticTok() {
        if (isAnimating) return;

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        // [수정] 58~59초 조기 트리거 버그 완전 차단
        // sec가 정확히 0이 되는 타이밍을 포착하되, 이전 분과 확실히 다를 때 딱 한 번만 정각 루틴 진입
        if (sec === 0 && min !== lastTriggeredMin) {
            lastTriggeredMin = min;
            triggerClearRoutine(min);
            return;
        }

        if (sec !== 0) {
            lastTriggeredMin = -1; 
        }

        updateScoreBoard();
        draw(sec);
    }

    // 💥 60초(00초) 정각 카타르시스 처리 함수
    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        // [수정] 불완전한 칸 스캔 방식을 전면 폐기하고, 작가님의 '1분당 4줄 감소' 규칙을 완벽한 수학적 수식으로 고정
        // 15분 주기를 기준으로 현재 성벽이 도달해 있어야 할 정확한 바닥 라인을 계산합니다.
        const prevMin = (currentMin - 1 + 60) % 60; // 직전 59초 시점의 분 계산
        const clearedLines = (prevMin % 15) * 4;
        const maxWallRows = ROWS - 4; // 최대 성벽은 60칸
        const activeRows = maxWallRows - clearedLines;
        
        // 하늘색 블록이 성벽 바로 머리 위에 철컥 안착해야 하는 Y좌표 고정
        freezeBlockY = ROWS - activeRows - 4; 

        // 1단계: 00초 정각에 롱블록을 맨 바닥에 완벽히 채워진 형태로 보드 데이터에 선반영
        for (let i = 0; i < 4; i++) {
            let blockY = freezeBlockY + i;
            if (blockY >= 0 && blockY < ROWS) {
                board[blockY][targetX] = '#00f0f0';
            }
        }
        draw(0);
        gameContainer.classList.add('flash'); 

        // 컨테이너 전체를 위로 튕겨서 튕김 모션 연출
        gameContainer.style.transform = "translateY(-20px)";

        // 2단계: 0.3초(300ms) 동안 제자리 고정 연출 홀딩
        setTimeout(() => {
            gameContainer.style.transform = "translateY(0px)"; // 제자리 복귀
            gameContainer.classList.remove('flash');

            // 3단계: 완성된 4줄을 잘라내고 상단에 빈 행 추가
            const targetRowStart = freezeBlockY;
            if (targetRowStart >= 0 && targetRowStart + 4 <= ROWS) {
                board.splice(targetRowStart, 4); 
                for (let i = 0; i < 4; i++) {
                    board.unshift(Array(COLS).fill(0));
                }
            }

            updateScoreBoard(currentMin);
            
            // 데이터 변경 직후 즉시 리드로우를 실행하여 새로고침 없이 완벽 작동 보장
            draw(0); 
            isAnimating = false;

            // 15분 전체 리셋 룰
            if (currentMin % 15 === 0) {
                board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                draw(0);
                setTimeout(() => {
                    reloadWallAnimation(); 
                }, 400);
            }

        }, 300); 
    }

    // 앱 기동 시 최초 1회 즉시 실행
    generateWall();
    updateScoreBoard();
    draw(new Date().getSeconds());
    
    setInterval(ticTok, 100); // 00초 타이밍을 더 정밀하게 낚아채기 위해 주기 최적화
</script>

</body>
</html>
