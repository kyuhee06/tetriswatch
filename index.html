<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 (Tetris Clock) - Grid Fixed</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --grid-color: #1a1a2e;
            --cyan-color: #00f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 세로 디스플레이 레이아웃 캐비닛 */
        #cabinet {
            width: 450px;
            height: 850px;
            background: #111;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 대형 AABB 점수판 (HHMM 시계) */
        #scoreboard {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #score-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #score-digits {
            font-size: 48px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            letter-spacing: 5px;
        }

        /* [수정] 시각적 배경은 총 64칸 분량(640px)으로 설정하여 상단 4칸 여백 확보 */
        #game-container {
            position: relative;
            width: 200px;  
            height: 640px; 
            border: 3px solid #555;
            background: var(--grid-color);
            overflow: hidden;
            transition: transform 0.1s ease-out; 
        }

        /* [수정] 실제 블록이 쌓이는 60칸(600px)짜리 캔버스를 바닥 쪽에 밀착시키고, 상단에 40px 여백을 둠 */
        canvas {
            display: block;
            background: transparent;
            position: absolute;
            bottom: 0;
            left: 0;
        }
    </style>
</head>
<body>

<div id="cabinet">
    <div id="scoreboard">
        <div id="score-label">SCORE (HHMM)</div>
        <div id="score-digits">0000</div>
    </div>

    <div id="game-container">
        <canvas id="tetrisCanvas" width="200" height="600"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 60; // [수정] 실제 블록이 쌓이는 판은 무조건 60칸으로 원상복구
    const BLOCK_SIZE_X = 20; 
    const BLOCK_SIZE_Y = 10; 

    const COLORS = ['#e53e3e', '#dd6b20', '#ecc94b', '#38a169', '#3182ce', '#805ad5'];
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 9;       
    let isAnimating = false; 
    let fixedFloorY = 0; 

    // 실시간 분(Minute)에 따른 성벽 초기화 함수 (최대 60칸 완벽 적용)
    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        const clearedLines = (currentMin % 15) * 4;
        const activeRows = ROWS - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        for (let r = ROWS - activeRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) {
                    board[r][c] = COLORS[(r + c) % COLORS.length];
                }
            }
        }
    }

    // 렌더링 함수
    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 고정된 배경 블록 성벽 그리기
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    ctx.fillStyle = board[r][c];
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }

        // 2. 하늘색 롱블록 실시간 위치 그리기
        ctx.fillStyle = '#00f0f0';
        if (!isAnimating) {
            // [수정] 64칸 스크린 기준으로 매핑하되, 캔버스 영역(60칸) 내부에서 정확히 하강하도록 위치 조정
            // 00초에 가장 상단 시각적 여백 끝라인에서 출발해 1초에 1칸씩 하강
            let blockY = currentSec - 4; 
            
            for (let i = 0; i < 4; i++) {
                let currentBlockY = blockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        } else {
            // 애니메이션 연출 중에는 바닥 도착 위치에 그대로 고정
            for (let i = 0; i < 4; i++) {
                let currentBlockY = (fixedFloorY - 4) + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }
    }

    // 시분(AABB) 실시간 업데이트 함수
    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    // 15분 주기 완료 시 초고속 리로드 애니메이션
    function reloadWallAnimation() {
        isAnimating = true;
        let r = 0;
        
        const interval = setInterval(() => {
            if (r < ROWS) {
                for (let c = 0; c < COLS; c++) {
                    if (c !== targetX) board[r][c] = COLORS[(r + c) % COLORS.length];
                }
                draw(0);
                r += 2;
            } else {
                clearInterval(interval);
                isAnimating = false;
            }
        }, 15);
    }

    // 메인 시계 타이머 (0.2초마다 실시간 체크)
    function ticTok() {
        if (isAnimating) return;

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        if (sec === 0) {
            triggerClearRoutine(min);
            return;
        }

        updateScoreBoard();
        draw(sec);
    }

    // 💥 60초(00초) 정각 카타르시스 처리 함수
    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        const clearedLines = (currentMin % 15) * 4; 
        const floorY = ROWS - (clearedLines === 0 ? 0 : clearedLines - 4);
        fixedFloorY = floorY; 

        // 1단계: 00초 정각에 롱블록을 맨 바닥에 완벽히 채워진 형태로 강제 렌더링
        for (let i = 0; i < 4; i++) {
            let blockY = (floorY - 4) + i;
            if (blockY >= 0 && blockY < ROWS) {
                board[blockY][targetX] = '#00f0f0';
            }
        }
        draw(0);
        gameContainer.classList.add('flash'); 

        // 컨테이너 전체를 튕기게 하여 하늘색 블록이 바닥 도착 위치에 그대로 고정되게 처리
        gameContainer.style.transform = "translateY(-20px)";

        // 2단계: 0.3초(300ms) 동안 빈틈없이 가득 찬 모습을 그대로 노출 (Freeze)
        setTimeout(() => {
            gameContainer.style.transform = "translateY(0px)"; 
            gameContainer.classList.remove('flash');

            // 3단계: [4줄 파괴] + [점수판 변동] + [성벽 하강] 동시에 처리
            const targetRowStart = floorY - 4;
            board.splice(targetRowStart, 4); 
            
            for (let i = 0; i < 4; i++) {
                board.unshift(Array(COLS).fill(0));
            }

            updateScoreBoard(currentMin);
            
            draw(0); 
            isAnimating = false;

            // 15분 전체 리셋 룰
            if (currentMin % 15 === 0) {
                board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                draw(0);
                setTimeout(() => {
                    reloadWallAnimation(); 
                }, 400);
            }

        }, 300); 
    }

    // 앱 기동 시 최초 1회 즉시 실행
    generateWall();
    updateScoreBoard();
    draw(new Date().getSeconds());
    
    setInterval(ticTok, 200);
</script>

</body>
</html>
