<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 (Tetris Clock) - Final</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --grid-color: #1a1a2e;
            --cyan-color: #00f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 세로 디스플레이 레이아웃 캐비닛 */
        #cabinet {
            width: 450px;
            height: 850px;
            background: #111;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 대형 AABB 점수판 (HHMM 시계) */
        #scoreboard {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #score-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #score-digits {
            font-size: 48px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            letter-spacing: 5px;
        }

        /* 가로 10 × 세로 62 게임판 */
        #game-container {
            position: relative;
            width: 200px;  /* 1칸당 20px * 10칸 = 200px */
            height: 620px; /* 1칸당 10px * 62칸 = 620px */
            border: 3px solid #555;
            background: var(--grid-color);
            overflow: hidden;
        }

        canvas {
            display: block;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
            transition: transform 0.1s ease-out; /* 위로 튕기는 모션용 */
        }

        /* 60초 정각 연출용 번쩍임 효과 */
        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="cabinet">
    <div id="scoreboard">
        <div id="score-label">SCORE (HHMM)</div>
        <div id="score-digits">0000</div>
    </div>

    <div id="game-container">
        <canvas id="tetrisCanvas" width="200" height="620"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 62; // 62칸으로 수정
    const BLOCK_SIZE_X = 20; 
    const BLOCK_SIZE_Y = 10; 

    // 무지개색 성벽 색상 조합
    const RAINBOW = ['#ff0055', '#ff9900', '#ffcc00', '#33cc33', '#3399ff', '#9933ff'];
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 9; // 맨 오른쪽 10번째 열 공백
    let isAnimating = false;

    // 현재 내부적으로 흐르는 독립적인 초 (0 ~ 59)
    let internalSec = new Date().getSeconds();
    let lastLoggedMin = new Date().getMinutes();

    // 맵 초기화: 한 줄 무지개, 한 줄 빈칸 번갈아 생성
    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        // 15분 주기 중 현재 몇 분이 지났는지 계산하여 아래서부터 4줄씩 삭제된 상태로 채움
        const clearedLines = (currentMin % 15) * 4;
        const activeRows = ROWS - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        // 바닥에서부터 채워 올라감 (단, 한 줄 무지개 / 한 줄 빈칸 패턴 유지)
        let colorIdx = 0;
        for (let r = ROWS - 1; r >= ROWS - activeRows; r--) {
            // 아래서부터 계산했을 때, 짝수 줄에만 무지개 성벽을 채우고 홀수 줄은 비워둠
            if ((ROWS - 1 - r) % 2 === 0) {
                let rowColor = RAINBOW[colorIdx % RAINBOW.length];
                for (let c = 0; c < COLS; c++) {
                    if (c !== targetX) {
                        board[r][c] = rowColor;
                    }
                }
                colorIdx++;
            }
        }
    }

    // 렌더링 함수
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 고정된 배경 블록 성벽 그리기
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    ctx.fillStyle = board[r][c];
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }

        // 2. 하늘색 롱블록 그리기
        if (!isAnimating && internalSec > 0) {
            ctx.fillStyle = '#00f0f0';
            
            // 01초에 59번째 칸(인덱스 58)에서 머리가 출현하여 1초에 1칸씩 정확히 내려감
            // 머리 위치 = 58 + (internalSec - 1)
            let headY = 58 + (internalSec - 1);
            
            for (let i = 0; i < 4; i++) {
                let blockY = headY + i;
                if (blockY >= 0 && blockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, blockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }
    }

    // 시분(AABB) 실시간 업데이트 함수
    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    // 15분 주기 전체 리로드 애니메이션
    function reloadWallAnimation() {
        isAnimating = true;
        let r = ROWS - 1;
        let colorIdx = 0;
        
        const interval = setInterval(() => {
            if (r >= 0) {
                if ((ROWS - 1 - r) % 2 === 0) {
                    let rowColor = RAINBOW[colorIdx % RAINBOW.length];
                    for (let c = 0; c < COLS; c++) {
                        if (c !== targetX) board[r][c] = rowColor;
                    }
                    colorIdx++;
                }
                draw();
                r -= 2; // 두 줄씩 차오름
            } else {
                clearInterval(interval);
                isAnimating = false;
            }
        }, 20);
    }

    // 💥 60초 정각 루틴: 위로 튕기는 모션 후 동시 파괴
    function triggerClearRoutine() {
        isAnimating = true;
        
        const now = new Date();
        const currentMin = now.getMinutes();
        const clearedLines = ((currentMin - 1 + 15) % 15) * 4; 
        const floorY = ROWS - clearedLines;

        // 1단계: 정각에 맨 바닥 빈틈에 롱블록 최종 안착 상태 그리기
        for (let i = 0; i < 4; i++) {
            let blockY = (floorY - 4) + i;
            if (blockY >= 0 && blockY < ROWS) {
                board[blockY][targetX] = '#00f0f0';
            }
        }
        draw();

        // [수정사항 1번] 위로 2칸 정도(세로 20px만큼) 튕겨 올라가는 액션 추가
        canvas.style.transform = "translateY(-20px)";
        gameContainer.classList.add('flash'); 

        // 2단계: 0.3초(300ms) 동안 홀딩 후 원래 위치로 복귀하며 한 번에 삭제
        setTimeout(() => {
            canvas.style.transform = "translateY(0px)"; // 원위치 복귀
            gameContainer.classList.remove('flash');

            // 3단계: 4줄 일시 파괴 및 점수판 변경 변동 동시 처리
            const targetRowStart = floorY - 4;
            board.splice(targetRowStart, 4); // 4줄 완전 제거
            
            // 제거된 만큼 상단에 빈 공간 추가 (성벽 아래로 하강)
            for (let i = 0; i < 4; i++) {
                board.unshift(Array(COLS).fill(0));
            }

            updateScoreBoard(currentMin);
            draw();
            isAnimating = false;

            // 15분 주기 리셋 검사
            if (currentMin % 15 === 0) {
                board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                draw();
                setTimeout(() => {
                    reloadWallAnimation(); 
                }, 400);
            }

        }, 300); 
    }

    // 절대 타이머 메인 루프 (1초에 정확히 1번만 실행됨)
    function runClock() {
        const now = new Date();
        const realSec = now.getSeconds();
        const realMin = now.getMinutes();

        // 사용자가 중간에 브라우저 탭을 바꿨다 돌아왔을 때 싱크를 맞추기 위한 안전장치
        if (Math.abs(internalSec - realSec) > 1 || realMin !== lastLoggedMin) {
            internalSec = realSec;
            lastLoggedMin = realMin;
            if (!isAnimating) generateWall();
        }

        if (isAnimating) return;

        // 0초 정각 체크
        if (internalSec === 0) {
            triggerClearRoutine();
            internalSec = 1; // 다음 초 세팅
            return;
        }

        updateScoreBoard();
        draw(internalSec);

        // 초 증가 및 60초 순환
        internalSec = (internalSec + 1) % 60;
    }

    // 최초 1회 실행
    generateWall();
    updateScoreBoard();
    draw();
    
    // 외부 요인에 방해받지 않는 정밀한 1초(1000ms) 실행 타이머 연결
    setInterval(runClock, 1000);
</script>

</body>
</html>
