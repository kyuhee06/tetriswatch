<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 (Tetris Clock) - Final Verified</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --grid-color: #1a1a2e;
            --cyan-color: #00f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 세로 디스플레이 레이아웃 캐비닛 */
        #cabinet {
            width: 450px;
            height: 850px;
            background: #111;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 대형 AABB 점수판 (HHMM 시계) */
        #scoreboard {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #score-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #score-digits {
            font-size: 48px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            letter-spacing: 5px;
        }

        /* 테트리스 게임 화면 배경 네모 (세로 64칸) */
        #game-container {
            position: relative;
            width: 200px;  
            height: 640px; 
            border: 3px solid #555;
            background: var(--grid-color);
            overflow: hidden;
            transition: transform 0.1s ease-out; 
        }

        canvas {
            display: block;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 60초 정각 연출용 번쩍임 효과 */
        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="cabinet">
    <div id="scoreboard">
        <div id="score-label">SCORE (HHMM)</div>
        <div id="score-digits">0000</div>
    </div>

    <div id="game-container">
        <canvas id="tetrisCanvas" width="200" height="640"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 64; 
    const BLOCK_SIZE_X = 20; 
    const BLOCK_SIZE_Y = 10; 

    const COLORS = ['#e53e3e', '#dd6b20', '#ecc94b', '#38a169', '#3182ce', '#805ad5'];
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 9;       // 10번째 칸 (인덱스 9)
    let isAnimating = false; 
    let lastTriggeredMin = -1; 

    // [성공 버전 원상복구] 실시간 분(Minute)에 따른 성벽 초기화 함수
    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        const clearedLines = (currentMin % 15) * 4;
        const maxWallRows = ROWS - 4; 
        const activeRows = maxWallRows - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        for (let r = ROWS - activeRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) {
                    board[r][c] = COLORS[(r + c) % COLORS.length];
                }
            }
        }
    }

    // 렌더링 함수
    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 고정된 배경 블록 성벽 그리기
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    ctx.fillStyle = board[r][c];
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }

        // 2. 하늘색 롱블록 실시간 위치 그리기
        ctx.fillStyle = '#00f0f0';
        if (!isAnimating) {
            let blockY = currentSec; 
            
            for (let i = 0; i < 4; i++) {
                let currentBlockY = blockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        } else {
            // [수정] 작가님이 지정하신 00초 절대 안착 좌표 고정 (맨 아래 4칸: 60, 61, 62, 63행)
            for (let i = 0; i < 4; i++) {
                let currentBlockY = 60 + i;
                ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
            }
        }
    }

    // 시분(AABB) 실시간 업데이트 함수
    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    // 15분 주기 완료 시 초고속 리로드 애니메이션
    function reloadWallAnimation() {
        isAnimating = true;
        let r = 4; 
        
        const interval = setInterval(() => {
            if (r < ROWS) {
                for (let c = 0; c < COLS; c++) {
                    if (c !== targetX) board[r][c] = COLORS[(r + c) % COLORS.length];
                }
                draw(0);
                r += 2;
            } else {
                clearInterval(interval);
                isAnimating = false;
            }
        }, 15);
    }

    // 메인 시계 타이머 (실시간 체크)
    function ticTok() {
        if (isAnimating) return;

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        // 정확히 00초 정각 진입 체크
        if (sec === 0 && min !== lastTriggeredMin) {
            lastTriggeredMin = min;
            triggerClearRoutine(min);
            return;
        }

        if (sec !== 0) {
            lastTriggeredMin = -1; 
        }

        updateScoreBoard();
        draw(sec);
    }

    // 💥 60초(00초) 정각 카타르시스 처리 함수
    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        // 00초가 되자마자 하늘색 블록을 작가님이 말씀하신 맨 바닥 4칸(60~63행)에 즉시 꽂아 넣고 정지 상태 렌더링
        for (let i = 0; i < 4; i++) {
            board[60 + i][targetX] = '#00f0f0';
        }
        draw(0);

        // [수정] 00초 정각에는 아무것도 하지 않고 대기하다가, 정확히 00.3초(300ms)가 되는 순간 모든 정각 동작 동시 실행
        setTimeout(() => {
            // 튕김 애니메이션 및 번쩍임 가동
            gameContainer.classList.add('flash'); 
            gameContainer.style.transform = "translateY(-20px)";

            // 튕긴 상태 유지 및 파괴 처리를 위한 미세 딜레이 루틴
            setTimeout(() => {
                gameContainer.style.transform = "translateY(0px)"; // 제자리 복귀
                gameContainer.classList.remove('flash');

                // [성공 버전 코드 철저히 엄수] 4줄을 삭제 연산한 후 generateWall()로 실시간 분 동기화
                const targetRowStart = 60;
                board.splice(targetRowStart, 4); 
                for (let i = 0; i < 4; i++) {
                    board.unshift(Array(COLS).fill(0));
                }

                generateWall();
                updateScoreBoard(currentMin);
                
                draw(0); 
                isAnimating = false;

                // 15분 전체 리셋 룰
                if (currentMin % 15 === 0) {
                    board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                    draw(0);
                    setTimeout(() => {
                        reloadWallAnimation(); 
                    }, 400);
                }
            }, 300); // 튕김 모션 유지 시간

        }, 300); // [수정] 00.3초 대기 타이밍
    }

    // 앱 기동 시 최초 1회 즉시 실행
    generateWall();
    updateScoreBoard();
    draw(new Date().getSeconds());
    
    setInterval(ticTok, 100);
</script>

</body>
</html>
