<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 (Tetris Clock) - Base Fixed</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --grid-color: #1a1a2e;
            --cyan-color: #00f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 세로 디스플레이 레이아웃 캐비닛 */
        #cabinet {
            width: 450px;
            height: 850px;
            background: #111;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 대형 AABB 점수판 (HHMM 시계) */
        #scoreboard {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #score-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #score-digits {
            font-size: 48px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            letter-spacing: 5px;
        }

        /* 가로 10 × 세로 62 게임판 */
        #game-container {
            position: relative;
            width: 200px;  /* 1칸당 20px * 10칸 = 200px */
            height: 620px; /* 1칸당 10px * 62칸 = 620px */
            border: 3px solid #555;
            background: var(--grid-color);
            overflow: hidden;
            transition: transform 0.1s ease-out; /* [4번 반영] 튕기는 모션을 컨테이너 전체에 줌으로써 블록 위치 유지 */
        }

        canvas {
            display: block;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 60초 정각 연출용 번쩍임 효과 */
        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="cabinet">
    <div id="scoreboard">
        <div id="score-label">SCORE (HHMM)</div>
        <div id="score-digits">0000</div>
    </div>

    <div id="game-container">
        <canvas id="tetrisCanvas" width="200" height="620"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 62; 
    const BLOCK_SIZE_X = 20; 
    const BLOCK_SIZE_Y = 10; 

    // 선명한 무지개 성벽 색상 조합
    const RAINBOW = ['#ff0055', '#ff9900', '#ffcc00', '#33cc33', '#3399ff', '#9933ff'];
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 9;       
    let isAnimating = false; 

    // 성벽 초기화 함수: 한 줄 무지개색, 한 줄 빈칸 패턴 생성
    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        const clearedLines = (currentMin % 15) * 4;
        const activeRows = ROWS - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        let colorIdx = 0;
        for (let r = ROWS - 1; r >= ROWS - activeRows; r--) {
            if ((ROWS - 1 - r) % 2 === 0) {
                let rowColor = RAINBOW[colorIdx % RAINBOW.length];
                for (let c = 0; c < COLS; c++) {
                    if (c !== targetX) {
                        board[r][c] = rowColor;
                    }
                }
                colorIdx++;
            }
        }
    }

    // 렌더링 함수
    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 고정된 배경 블록 성벽 그리기
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    ctx.fillStyle = board[r][c];
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }

        // 2. 하늘색 롱블록 실시간 위치 그리기 (정각 연출 중이 아닐 때만 실행)
        if (!isAnimating) {
            ctx.fillStyle = '#00f0f0';
            
            if (currentSec > 0 && currentSec < 60) {
                // [2번 반영] 출발 위치를 위로 4칸 이동 (기존 58에서 54로 변경)
                let headY = 54 - (currentSec - 1); 
                
                for (let i = 0; i < 4; i++) {
                    let blockY = headY + i; 
                    
                    if (blockY >= 0 && blockY < ROWS) {
                        ctx.fillRect(targetX * BLOCK_SIZE_X, blockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                    }
                }
            }
        }
    }

    // 시분(AABB) 실시간 업데이트 함수
    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    // 15분 주기 완료 시 초고속 리로드 애니메이션
    function reloadWallAnimation() {
        isAnimating = true;
        let r = ROWS - 1;
        let colorIdx = 0;
        
        const interval = setInterval(() => {
            if (r >= 0) {
                if ((ROWS - 1 - r) % 2 === 0) {
                    let rowColor = RAINBOW[colorIdx % RAINBOW.length];
                    for (let c = 0; c < COLS; c++) {
                        if (c !== targetX) board[r][c] = rowColor;
                    }
                    colorIdx++;
                }
                draw(0);
                r -= 2;
            } else {
                clearInterval(interval);
                isAnimating = false;
            }
        }, 20);
    }

    // 메인 시계 타이머 (0.2초마다 실시간 체크)
    function ticTok() {
        if (isAnimating) return;

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        if (sec === 0) {
            triggerClearRoutine(min);
            return;
        }

        updateScoreBoard();
        draw(sec);
    }

    // 💥 60초(00초) 정각 카타르시스 처리 함수
    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        const clearedLines = ((currentMin - 1 + 15) % 15) * 4; 
        const floorY = ROWS - clearedLines;

        // 1단계: 00초 정각에 롱블록을 맨 바닥에 완벽히 채워진 형태로 강제 고정
        for (let i = 0; i < 4; i++) {
            let blockY = (floorY - 4) + i;
            if (blockY >= 0 && blockY < ROWS) {
                board[blockY][targetX] = '#00f0f0';
            }
        }
        draw(0);
        gameContainer.classList.add('flash'); 

        // [4번 반영] canvas가 아닌 gameContainer 자체를 튕겨서 하늘색 블록이 바닥에 그대로 붙어있게 처리
        gameContainer.style.transform = "translateY(-20px)";

        // 2단계: 0.3초(300ms) 동안 홀딩 후 원래 위치로 떨어지며 한 번에 삭제
        setTimeout(() => {
            gameContainer.style.transform = "translateY(0px)"; 
            gameContainer.classList.remove('flash');

            // 3단계: [4줄 파괴] + [점수판 변동] + [성벽 하강] 동시에 처리
            const targetRowStart = floorY - 4;
            board.splice(targetRowStart, 4); 
            
            for (let i = 0; i < 4; i++) {
                board.unshift(Array(COLS).fill(0));
            }

            updateScoreBoard(currentMin);
            
            // [1번, 3번 반영] 데이터 연산 직후 draw(0)를 즉시 실행하여 실시간 화면 갱신 강제 적용
            draw(0); 
            isAnimating = false;

            // 15분 전체 리셋 룰
            if (currentMin % 15 === 0) {
                board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                draw(0);
                setTimeout(() => {
                    reloadWallAnimation(); 
                }, 400);
            }

        }, 300); 
    }

    // 앱 기동 시 최초 1회 즉시 실행
    generateWall();
    updateScoreBoard();
    draw(new Date().getSeconds());
    
    setInterval(ticTok, 200);
</script>

</body>
</html>
