<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 ⏰ (Tetris Clock) - Margin Fixed</title>
    <style>
        @font-face {
            font-family: 'RoundedFixedsys';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #000000;
            --grid-color: #000000;
            --border-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'RoundedFixedsys', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; 
            width: 1080px;
            height: 1920px;
            margin: 0 auto; 
            
            /* ========================================================== */
            /* ↕️ [스크롤 삭제 구역] 나중에 스크롤을 지우려면 이 3줄을 수정하세요 */
            overflow-y: auto;          
            padding-top: 50px;         
            padding-bottom: 50px;      
            /* 원래 상태로 가려면: overflow: hidden; padding 삭제 */
            /* ========================================================== */
            
            box-sizing: border-box;
        }

        /* 대형 점수판 - 크기: 450px * 250px, 선 두께 4px Outside */
        #scoreboard {
            position: relative;
            width: 450px;
            height: 250px;
            background: #000000;
            border: 4px solid var(--border-color);
            box-sizing: content-box;
            
            /* ========================================================== */
            /* 🎯 [간격 수정 완료] 점수판과 테트리스 게임 화면 사이의 패딩을 50px로 변경 */
            margin-bottom: 50px; 
            /* ========================================================== */
            
            flex-shrink: 0;      
        }

        /* SCORE (HHMM) - 크기 40px, 위쪽 선과의 패딩 34px */
        #score-label {
            position: absolute;
            top: 34px;
            left: 0;
            width: 100%;
            font-size: 40px;
            color: #ffffff;
            text-align: center;
        }

        /* 0000 - 크기 96px, 위쪽 선과의 패딩 101px */
        #score-digits {
            position: absolute;
            top: 101px;
            left: 0;
            width: 100%;
            font-size: 96px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
        }

        /* 테트리스 게임 화면 - 크기: 450px * 1440px, 선 두께 4px Outside */
        #game-container {
            position: relative;
            width: 450px;  
            height: 1440px; 
            border: 4px solid var(--border-color);
            background: var(--grid-color);
            box-sizing: content-box;
            overflow: hidden;
            transition: transform 0.1s ease-out; 
            flex-shrink: 0;      
        }

        canvas {
            display: block;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 60초 정각 연출용 번쩍임 효과 */
        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }

        /* ========================================================== */
        /* 🔔 [기능 수정용 신규 연출 디자인 추가 승인 구역] */
        /* 15분 정각 전체 화면 하얀색 깜빡임 애니메이션 (기존 디자인 무해) */
        .full-flash {
            animation: full-flash-anim 0.6s ease-out;
        }
        @keyframes full-flash-anim {
            0% { filter: brightness(1) invert(0); }
            10% { filter: brightness(5) invert(1); } 
            100% { filter: brightness(1) invert(0); }
        }
        /* ========================================================== */
    </style>
</head>
<body>

<div id="scoreboard">
    <div id="score-label">SCORE (HHMM)</div>
    <div id="score-digits">0000</div>
</div>

<div id="game-container">
    <canvas id="tetrisCanvas" width="450" height="1440"></canvas>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 64; 
    
    const BLOCK_SIZE_X = 45; 
    const BLOCK_SIZE_Y = 22.5; 

    const WALL_COLOR = '#606060';
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 5;       
    let isAnimating = false; 
    let isFlashing = false;   
    let lastTriggeredMin = -1; 

    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        const clearedLines = (currentMin % 15) * 4;
        const maxWallRows = ROWS - 4; 
        const activeRows = maxWallRows - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        for (let r = ROWS - activeRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) {
                    board[r][c] = WALL_COLOR;
                }
            }
        }
    }

    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    if (isFlashing && r >= 60) {
                        ctx.fillStyle = '#ffffff';
                    } else {
                        ctx.fillStyle = board[r][c];
                    }
                    
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(c * BLOCK_SIZE_X + 1, r * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
                }
            }
        }

        ctx.fillStyle = '#ff0000';
        if (!isAnimating) {
            let blockY = currentSec; 
            
            for (let i = 0; i < 4; i++) {
                let currentBlockY = blockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(targetX * BLOCK_SIZE_X + 1, currentBlockY * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
                }
            }
        } else {
            for (let i = 0; i < 4; i++) {
                let currentBlockY = 60 + i;
                ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.strokeRect(targetX * BLOCK_SIZE_X + 1, currentBlockY * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
            }
        }
    }

    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    function reloadWallAnimation() {
        const maxWallRows = ROWS - 4; 
        for (let r = ROWS - maxWallRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) board[r][c] = WALL_COLOR;
            }
        }
        draw(0);
        isAnimating = false; 
    }

    function ticTok() {
        if (isAnimating) {
            requestAnimationFrame(ticTok);
            return;
        }

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        if (sec === 0 && min !== lastTriggeredMin) {
            lastTriggeredMin = min;
            triggerClearRoutine(min);
            requestAnimationFrame(ticTok);
            return;
        }

        if (sec !== 0) {
            lastTriggeredMin = -1; 
        }

        updateScoreBoard();
        draw(sec); 

        requestAnimationFrame(ticTok);
    }

    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        for (let i = 0; i < 4; i++) {
            board[60 + i][targetX] = '#ff0000';
        }
        draw(0);

        setTimeout(() => {
            isFlashing = true; 
            gameContainer.classList.add('flash'); 
            gameContainer.style.transform = "translateY(-20px)";
            draw(0); 

            setTimeout(() => {
                gameContainer.style.transform = "translateY(0px)"; 
                gameContainer.classList.remove('flash');
                isFlashing = false; 

                const targetRowStart = 60;
                board.splice(targetRowStart, 4); 
                for (let i = 0; i < 4; i++) {
                    board.unshift(Array(COLS).fill(0));
                }

                generateWall();
                updateScoreBoard(currentMin);
                
                draw(0); 

                if (currentMin % 15 === 0) {
                    board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                    draw(0);
                    
                    document.body.classList.add('full-flash');
                    
                    setTimeout(() => {
                        reloadWallAnimation(); 
                    }, 100);

                    setTimeout(() => {
                        document.body.classList.remove('full-flash');
                        isAnimating = false; 
                    }, 600); 
                } else {
                    isAnimating = false; 
                }
            }, 300); 

        }, 300); 
    }

    generateWall();
    updateScoreBoard();
    draw(new Date().getSeconds());
    
    requestAnimationFrame(ticTok);
</script>

</body>
</html>
