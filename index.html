<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 (Tetris Clock) - Final Exhibition</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --grid-color: #1a1a2e;
            --cyan-color: #00f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 세로 디스플레이 레이아웃 캐비닛 */
        #cabinet {
            width: 450px;
            height: 850px;
            background: #111;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 대형 AABB 점수판 (HHMM 시계) */
        #scoreboard {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #score-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #score-digits {
            font-size: 48px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            letter-spacing: 5px;
        }

        /* [1번 반영] 테트리스 배경 네모를 오차 없이 정확히 블록 64칸 세로 크기(640px)로 고정 */
        #game-container {
            position: relative;
            width: 200px;  /* 1칸당 20px * 10칸 = 200px */
            height: 640px; /* 1칸당 10px * 64칸 = 640px */
            border: 3px solid #555;
            background: var(--grid-color);
            overflow: hidden;
            transition: transform 0.1s ease-out; /* 정각에 위로 튕기는 효과 */
        }

        canvas {
            display: block;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 60초 정각 연출용 번쩍임 효과 */
        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="cabinet">
    <div id="scoreboard">
        <div id="score-label">SCORE (HHMM)</div>
        <div id="score-digits">0000</div>
    </div>

    <div id="game-container">
        <canvas id="tetrisCanvas" width="200" height="640"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 64; // [1번 반영] 내부 논리 행 개수도 완벽하게 64칸 고정
    const BLOCK_SIZE_X = 20; 
    const BLOCK_SIZE_Y = 10; 

    const COLORS = ['#e53e3e', '#dd6b20', '#ecc94b', '#38a169', '#3182ce', '#805ad5'];
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 9;       
    let isAnimating = false; 
    let freezeBlockY = 0; // [2번 반영] 튕김 연출 시 하늘색 블록 위치 고정용 좌표 백업 변수

    // 실시간 분(Minute)에 따른 성벽 초기화 함수
    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        // 15분 주기 중 현재 몇 분이 지났는지에 따라 4줄씩 삭제 처리
        const clearedLines = (currentMin % 15) * 4;
        
        // 배경 64칸 중 위쪽 4줄은 무조건 빈 공간, 성벽은 아래쪽 최대 60칸만 채워짐
        const maxWallRows = ROWS - 4; 
        const activeRows = maxWallRows - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        // 아래서부터 계산하여 빽빽하게 블록을 채워 올림
        for (let r = ROWS - activeRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) {
                    board[r][c] = COLORS[(r + c) % COLORS.length];
                }
            }
        }
    }

    // 렌더링 함수
    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 고정된 배경 블록 성벽 그리기
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    ctx.fillStyle = board[r][c];
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }

        // 2. 하늘색 롱블록 실시간 위치 그리기
        ctx.fillStyle = '#00f0f0';
        if (!isAnimating) {
            // [1번 반영] 00초~01초 영역에서 배경 네모의 맨 위 끝칸(Y=0)에 딱 붙어서 정확히 노출 시작
            let blockY = currentSec; 
            
            for (let i = 0; i < 4; i++) {
                let currentBlockY = blockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        } else {
            // [2번 반영] 튕김 연출 실행 중에는 연산 버그로 위로 튀지 않고, 바닥 안착 자리에 완벽하게 고정
            for (let i = 0; i < 4; i++) {
                let currentBlockY = freezeBlockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }
    }

    // 시분(AABB) 실시간 업데이트 함수
    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    // 15분 주기 완료 시 초고속 리로드 애니메이션
    function reloadWallAnimation() {
        isAnimating = true;
        let r = 4; // 상단 4줄 여백 제외하고 5번째 줄부터 차오름
        
        const interval = setInterval(() => {
            if (r < ROWS) {
                for (let c = 0; c < COLS; c++) {
                    if (c !== targetX) board[r][c] = COLORS[(r + c) % COLORS.length];
                }
                draw(0);
                r += 2;
            } else {
                clearInterval(interval);
                isAnimating = false;
            }
        }, 15);
    }

    // 메인 시계 타이머 (0.2초마다 실시간 체크)
    function ticTok() {
        if (isAnimating) return;

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        if (sec === 0) {
            triggerClearRoutine(min);
            return;
        }

        updateScoreBoard();
        draw(sec);
    }

    // 💥 60초(00초) 정각 카타르시스 처리 함수
    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        const clearedLines = (currentMin % 15) * 4; 
        // 이번 정각에 하늘색 블록이 닿아 멈추어야 하는 바닥 Y라인 정확히 계산
        const floorY = ROWS - (clearedLines === 0 ? 0 : clearedLines - 4);
        
        // [2번 반영] 정각 연출이 진행되는 동안 하늘색 블록이 순간이동하지 않도록 현재 바닥 안착 좌표를 그대로 백업 고정
        freezeBlockY = floorY - 4; 

        // 1단계: 00초 정각에 롱블록을 맨 바닥에 완벽히 채워진 형태로 보드 데이터에 선반영
        for (let i = 0; i < 4; i++) {
            let blockY = freezeBlockY + i;
            if (blockY >= 0 && blockY < ROWS) {
                board[blockY][targetX] = '#00f0f0';
            }
        }
        draw(0);
        gameContainer.classList.add('flash'); 

        // [2번 반영] 컨테이너 전체를 위로 튕겨서, 하늘색 블록도 성벽 바닥에 철컥 붙은 채 움직이지 않게 처리
        gameContainer.style.transform = "translateY(-20px)";

        // 2단계: 0.3초(300ms) 동안 가득 찬 연출 상태 홀딩
        setTimeout(() => {
            gameContainer.style.transform = "translateY(0px)"; // 제자리 복귀
            gameContainer.classList.remove('flash');

            // 3단계: [3번 반영] 새로고침 필요 없이 내부 데이터를 완전히 재정렬하여 즉시 반영
            // 실시간 분을 기준으로 보드를 다시 완전 동기화하여 완벽한 하강 피드백 보장
            generateWall();

            updateScoreBoard(currentMin);
            
            // 데이터 변경 직후 스크린 리드로우 강제 호출로 완벽한 실시간 연출 완료
            draw(0); 
            isAnimating = false;

            // 15분 전체 리셋 룰
            if (currentMin % 15 === 0) {
                board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                draw(0);
                setTimeout(() => {
                    reloadWallAnimation(); 
                }, 400);
            }

        }, 300); 
    }

    // 앱 기동 시 최초 1회 즉시 실행
    generateWall();
    updateScoreBoard();
    draw(new Date().getSeconds());
    
    setInterval(ticTok, 200);
</script>

</body>
</html>
