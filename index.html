<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 ⏰ (Tetris Clock) - Scroll Enabled</title>
    <style>
        @font-face {
            font-family: 'RoundedFixedsys';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            --bg-color: #000000;
            --grid-color: #000000;
            --border-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            font-family: 'RoundedFixedsys', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            /* 1080 * 1920 크기는 엄격하게 유지하되, 화면에 맞춰 유연하게 정렬 */
            justify-content: flex-start; 
            width: 1080px;
            height: 1920px;
            margin: 0 auto; /* 가로 중앙 정렬 */
            
            /* ========================================================== */
            /* ↕️ [스크롤 삭제 구역] 나중에 스크롤을 지우려면 이 3줄을 수정하세요 */
            overflow-y: auto;          /* 내용이 넘치면 세로 스크롤바 자동 생성 */
            padding-top: 50px;         /* 노트북 상단 여백 추가 */
            padding-bottom: 50px;      /* 노트북 하단 여백 추가 */
            /* 원래 상태로 가려면: overflow: hidden; padding 삭제 */
            /* ========================================================== */
            
            box-sizing: border-box;
        }

        /* 대형 점수판 - 크기: 450px * 250px, 선 두께 4px Outside */
        #scoreboard {
            position: relative;
            width: 450px;
            height: 250px;
            background: #000000;
            border: 4px solid var(--border-color);
            box-sizing: content-box;
            margin-bottom: 20px; /* 점수판과 게임 화면 사이의 간격 */
            flex-shrink: 0;      /* 스크롤 시 박스가 찌그러지지 않도록 고정 */
        }

        /* SCORE (HHMM) - 크기 40px, 위쪽 선과의 패딩 34px */
        #score-label {
            position: absolute;
            top: 34px;
            left: 0;
            width: 100%;
            font-size: 40px;
            color: #ffffff;
            text-align: center;
        }

        /* 0000 - 크기 96px, 위쪽 선과의 패딩 101px */
        #score-digits {
            position: absolute;
            top: 101px;
            left: 0;
            width: 100%;
            font-size: 96px;
            font-weight: bold;
            color: #ffffff;
            text-align: center;
        }

        /* 테트리스 게임 화면 - 크기: 450px * 1440px, 선 두께 4px Outside */
        #game-container {
            position: relative;
            width: 450px;  
            height: 1440px; 
            border: 4px solid var(--border-color);
            background: var(--grid-color);
            box-sizing: content-box;
            overflow: hidden;
            transition: transform 0.1s ease-out; 
            flex-shrink: 0;      /* 스크롤 시 박스가 찌그러지지 않도록 고정 */
        }

        canvas {
            display: block;
            background: transparent;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* 60초 정각 연출용 번쩍임 효과 */
        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="scoreboard">
    <div id="score-label">SCORE (HHMM)</div>
    <div id="score-digits">0000</div>
</div>

<div id="game-container">
    <canvas id="tetrisCanvas" width="450" height="1440"></canvas>
</div>

<script>
    // ⚠️ 아래 자바스크립트(기능 로직)는 단 한 글자도 수정하지 않고 원본 그대로 보존했습니다.
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 64; 
    
    const BLOCK_SIZE_X = 45; 
    const BLOCK_SIZE_Y = 22.5; 

    const WALL_COLOR = '#606060';
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 5;       
    let isAnimating = false; 
    let isFlashing = false;   
    let lastTriggeredMin = -1; 

    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        const clearedLines = (currentMin % 15) * 4;
        const maxWallRows = ROWS - 4; 
        const activeRows = maxWallRows - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        for (let r = ROWS - activeRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) {
                    board[r][c] = WALL_COLOR;
                }
            }
        }
    }

    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    if (isFlashing && r >= 60) {
                        ctx.fillStyle = '#ffffff';
                    } else {
                        ctx.fillStyle = board[r][c];
                    }
                    
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(c * BLOCK_SIZE_X + 1, r * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
                }
            }
        }

        ctx.fillStyle = '#ff0000';
        if (!isAnimating) {
            let blockY = currentSec; 
            
            for (let i = 0; i < 4; i++) {
                let currentBlockY = blockY + i;
                if (currentBlockY >= 0 && currentBlockY < ROWS) {
                    ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(targetX * BLOCK_SIZE_X + 1, currentBlockY * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
                }
            }
        } else {
            for (let i = 0; i < 4; i++) {
                let currentBlockY = 60 + i;
                ctx.fillRect(targetX * BLOCK_SIZE_X, currentBlockY * BLOCK_SIZE_Y, BLOCK_SIZE_X, BLOCK_SIZE_Y);
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 2;
                ctx.strokeRect(targetX * BLOCK_SIZE_X + 1, currentBlockY * BLOCK_SIZE_Y + 1, BLOCK_SIZE_X - 2, BLOCK_SIZE_Y - 2);
            }
        }
    }

    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    function reloadWallAnimation() {
        isAnimating = true;
        let r = 4; 
        
        const interval = setInterval(() => {
            if (r < ROWS) {
                for (let c = 0; c < COLS; c++) {
                    if (c !== targetX) board[r][c] = WALL_COLOR;
                }
                draw(0);
                r += 2;
            } else {
                clearInterval(interval);
                isAnimating = false;
            }
        }, 15);
    }

    function ticTok() {
        if (isAnimating) return;

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        if (sec === 0 && min !== lastTriggeredMin) {
            lastTriggeredMin = min;
            triggerClearRoutine(min);
            return;
        }

        if (sec !== 0) {
            lastTriggeredMin = -1; 
        }

        updateScoreBoard();
        draw(sec);
    }

    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        for (let i = 0; i < 4; i++) {
            board[60 + i][targetX] = '#ff0000';
        }
        draw(0);

        setTimeout(() => {
            isFlashing = true; 
            gameContainer.classList.add('flash'); 
            gameContainer.style.transform = "translateY(-20px)";
            draw(0); 

            setTimeout(() => {
                gameContainer.style.transform = "translateY(0px)"; 
                gameContainer.classList.remove('flash');
                isFlashing = false; 

                const targetRowStart = 60;
                board.splice(targetRowStart, 4); 
                for (let i = 0; i < 4; i++) {
                    board.unshift(Array(COLS).fill(0));
                }

                generateWall();
                updateScoreBoard(currentMin);
                
                draw(0); 
                isAnimating = false;

                if (currentMin % 15 === 0) {
                    board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                    draw(0);
                    setTimeout(() => {
                        reloadWallAnimation(); 
                    }, 400);
                }
            }, 300); 

        }, 300); 
    }

    generateWall();
    updateScoreBoard();
    draw(new Date().getSeconds());
    
    setInterval(ticTok, 100);
</script>

</body>
</html>
