<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>테트리스 중독자의 시계 (Tetris Clock) - Fixed</title>
    <style>
        :root {
            --bg-color: #0a0a12;
            --grid-color: #1a1a2e;
            --cyan-color: #00f0f0;
        }

        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 16:9 세로 디스플레이 레이아웃 캐비닛 */
        #cabinet {
            width: 450px;
            height: 800px;
            background: #111;
            border: 4px solid #333;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* 대형 AABB 점수판 (HHMM 시계) */
        #scoreboard {
            width: 100%;
            background: #000;
            border: 2px solid #444;
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        #score-label {
            font-size: 14px;
            color: #888;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        #score-digits {
            font-size: 48px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
            letter-spacing: 5px;
        }

        /* 가로 10 × 세로 60 게임판 */
        #game-container {
            position: relative;
            width: 200px;  /* 1칸당 20px * 10칸 */
            height: 600px; /* 1칸당 10px * 60칸 */
            border: 3px solid #555;
            background: var(--grid-color);
            overflow: hidden;
        }

        canvas {
            display: block;
            background: transparent;
        }

        /* 60초 정각 연출용 번쩍임 효과 */
        .flash {
            animation: flash-anim 0.3s ease-in-out;
        }
        @keyframes flash-anim {
            0% { filter: brightness(1); }
            50% { filter: brightness(2.5); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>

<div id="cabinet">
    <div id="scoreboard">
        <div id="score-label">SCORE (HHMM)</div>
        <div id="score-digits">0000</div>
    </div>

    <div id="game-container">
        <canvas id="tetrisCanvas" width="200" height="600"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('tetrisCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDigits = document.getElementById('score-digits');
    const gameContainer = document.getElementById('game-container');

    const COLS = 10;
    const ROWS = 60;
    const BLOCK_SIZE_X = 20; 
    const BLOCK_SIZE_Y = 10; 

    const COLORS = ['#e53e3e', '#dd6b20', '#ecc94b', '#38a169', '#3182ce', '#805ad5'];
    let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
    
    const targetX = 9;       // 맨 오른쪽 10번째 열(인덱스 9) 공백 유지
    let isAnimating = false; // 정각 애니메이션 중 타이머 정지용 제어 변수

    // 실시간 분(Minute)에 따른 성벽 초기화 함수
    function generateWall() {
        const now = new Date();
        const currentMin = now.getMinutes();
        
        // 15분 주기 중 현재 몇 분이 지났는지 계산하여 아래서부터 4줄씩 비워둠
        const clearedLines = (currentMin % 15) * 4;
        const activeRows = ROWS - clearedLines;

        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        // 남아있는 성벽 그리기
        for (let r = ROWS - activeRows; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (c !== targetX) {
                    board[r][c] = COLORS[(r + c) % COLORS.length];
                }
            }
        }
    }

    // 렌더링 함수
    function draw(currentSec = 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 고정된 배경 블록 성벽 그리기
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (board[r][c]) {
                    ctx.fillStyle = board[r][c];
                    ctx.fillRect(c * BLOCK_SIZE_X, r * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                }
            }
        }

        // 2. 하늘색 롱블록 실시간 위치 그리기 (정각 연출 중이 아닐 때만 실행)
        if (!isAnimating) {
            ctx.fillStyle = '#00f0f0';
            
            // 00초에는 화면에 블록이 없고, 01초부터 1칸씩 아래쪽으로 노출되며 하강함
            if (currentSec > 0) {
                for (let i = 0; i < 4; i++) {
                    // 현재 초가 롱블록의 '머리' 위치가 됨 (1초에 정확히 1칸씩 하강)
                    let blockY = (currentSec - 1) + i; 
                    
                    // 화면 영역(0~59층) 내부에 있을 때만 픽셀을 그림
                    if (blockY >= 0 && blockY < ROWS) {
                        ctx.fillRect(targetX * BLOCK_SIZE_X, blockY * BLOCK_SIZE_Y, BLOCK_SIZE_X - 1, BLOCK_SIZE_Y - 1);
                    }
                }
            }
        }
    }

    // 시분(AABB) 실시간 업데이트 함수
    function updateScoreBoard(forcedMin = null) {
        const now = new Date();
        let hh = String(now.getHours()).padStart(2, '0');
        let mm = String(forcedMin !== null ? forcedMin : now.getMinutes()).padStart(2, '0');
        scoreDigits.innerText = `${hh}${mm}`;
    }

    // 15분 주기 완료 시 초고속 리로드 애니메이션
    function reloadWallAnimation() {
        isAnimating = true;
        let r = 0;
        
        const interval = setInterval(() => {
            if (r < ROWS) {
                for (let c = 0; c < COLS; c++) {
                    if (c !== targetX) board[r][c] = COLORS[(r + c) % COLORS.length];
                }
                draw(0);
                r += 2;
            } else {
                clearInterval(interval);
                isAnimating = false;
            }
        }, 15);
    }

    // 메인 시계 타이머 (매 순간 호출)
    function ticTok() {
        if (isAnimating) return;

        const now = new Date();
        const sec = now.getSeconds();
        const min = now.getMinutes();

        // 00초 정각이 되는 순간 터지는 루틴 발동
        if (sec === 0) {
            triggerClearRoutine(min);
            return;
        }

        updateScoreBoard();
        draw(sec);
    }

    // 💥 60초(00초) 정각 카타르시스 처리 함수 (0.3초 대기 후 동시 파괴)
    function triggerClearRoutine(currentMin) {
        isAnimating = true;
        
        // 현재 분(Minute) 기준으로 작동해야 할 바닥 계산
        const clearedLines = ((currentMin - 1 + 15) % 15) * 4; 
        const floorY = ROWS - clearedLines;

        // 1단계: 00초 정각에 롱블록을 맨 바닥에 완벽히 채워진 형태로 강제 렌더링
        for (let i = 0; i < 4; i++) {
            let blockY = (floorY - 4) + i;
            if (blockY >= 0 && blockY < ROWS) {
                board[blockY][targetX] = '#00f0f0';
            }
        }
        draw(0);
        gameContainer.classList.add('flash'); // 화면 번쩍임

        // 2단계: 0.3초(300ms) 동안 빈틈없이 가득 찬 모습을 그대로 노출 (Freeze)
        setTimeout(() => {
            gameContainer.classList.remove('flash');

            // 3단계: [4줄 파괴] + [점수판 변동] + [성벽 하강] 동시에 처리
            const targetRowStart = floorY - 4;
            board.splice(targetRowStart, 4); // 바닥 4줄 완전 제거
            
            // 삭제된 만큼 최상단에 빈 배열 추가 (성벽 전체가 4칸 아래로 툭 떨어짐)
            for (let i = 0; i < 4; i++) {
                board.unshift(Array(COLS).fill(0));
            }

            // 점수판 분(Minute) 증가 동시 반영
            updateScoreBoard(currentMin);
            draw(0);
            isAnimating = false;

            // [15분 전체 리셋 룰] 15분 주기로 판이 완전히 비었을 때 성벽 새로고침
            if (currentMin % 15 === 0) {
                board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                draw(0);
                setTimeout(() => {
                    reloadWallAnimation(); 
                }, 400);
            }

        }, 300); 
    }

    // 앱 기동 시 최초 1회 즉시 실행
    generateWall();
    updateScoreBoard();
    draw(new Date().getSeconds());
    
    // 0.2초마다 실시간 체크하여 타이밍 오차 방지
    setInterval(ticTok, 200);
</script>

</body>
</html>
